name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      prefix:
        required: false
        default: branches
        type: string
      base_url:
        required: false
        default: "https://staging-editor-static.raspberrypi.org"
        type: string
      assets_url:
        required: false
        default: "https://staging-editor-static.raspberrypi.org"
        type: string
      html_renderer_url:
        required: false
        default: "https://staging-editor-static.raspberrypi.org"
        type: string
      react_app_api_endpoint:
        required: false
        default: "https://staging-editor-api.raspberrypi.org"
        type: string
      react_app_authentication_client_id:
        required: false
        default: editor-api
        type: string
      react_app_authentication_url:
        required: false
        default: "https://staging-auth-v2.raspberrypi.org"
        type: string
      react_app_base_url:
        required: false
        default: "unspecified"
        type: string
      react_app_cookiebot_domain_group_id:
        required: false
        default: "1e9a6bdd-5870-4d54-8e5f-adcf6b5c5499"
        type: string
      react_app_google_tag_manager_id:
        required: false
        default: ""
        type: string
      react_app_sentry_dsn:
        required: false
        default: "https://a6d7b79c7a474a6499ace73acf792a83@o17504.ingest.sentry.io/4504055099621376"
        type: string
      react_app_sentry_env:
        required: false
        default: "review"
        type: string
      react_app_allowed_iframe_origins:
        required: false
        default: "https://staging-editor.raspberrypi.org,https://staging-editor-static.raspberrypi.org,https://test-editor.raspberrypi.org,https://staging-classroom.raspberrypi.org,https://test-classroom.raspberrypi.org"
        type: string
      csp_api_multiple_origins:
        required: false
        default: ""
        type: string

    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_REGION:
        required: false
      AWS_S3_BUCKET:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_ENDPOINT:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false

jobs:
  setup-environment:
    runs-on: ubuntu-latest
    outputs:
      deploy_dir: ${{ steps.setup-environment.outputs.deploy_dir }}
      public_url: ${{ steps.setup-environment.outputs.public_url }}
      assets_url: ${{ steps.setup-environment.outputs.assets_url }}
      html_renderer_url: ${{ steps.setup-environment.outputs.html_renderer_url }}
      react_app_base_url: ${{ steps.setup-environment.outputs.react_app_base_url }}
    steps:
      - id: setup-environment
        run: |
          safe_ref_name="${GITHUB_REF_NAME//[![:alnum:].]/_}"
          deploy_dir=${{inputs.prefix}}/$safe_ref_name
          public_url=${{inputs.base_url}}/$deploy_dir
          assets_url=${{inputs.assets_url}}/$deploy_dir
          html_renderer_url=${{inputs.html_renderer_url}}/$deploy_dir
          echo "deploy_dir=$deploy_dir" >> $GITHUB_OUTPUT
          echo "public_url=$public_url" >> $GITHUB_OUTPUT
          echo "assets_url=$assets_url" >> $GITHUB_OUTPUT
          echo "html_renderer_url=$html_renderer_url" >> $GITHUB_OUTPUT
          if [ "${{inputs.react_app_base_url}}" = "unspecified" ] ; then
            echo "react_app_base_url=$deploy_dir" >> $GITHUB_OUTPUT
          else
            echo "react_app_base_url=${{inputs.react_app_base_url}}" >> $GITHUB_OUTPUT
          fi

  build-deploy:
    runs-on: ubuntu-latest
    needs: setup-environment
    environment:
      name: ${{ inputs.environment }}
      url: ${{ needs.setup-environment.outputs.public_url }}
    env:
      HAS_CLOUDFLARE_SECRETS: ${{ secrets.CLOUDFLARE_ZONE_ID != '' && secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - name: Check deployment path
        run: |
          echo "Deploying to '${{ needs.setup-environment.outputs.deploy_dir }}' -- job will fail if this is empty!"
          [ -n "${{ needs.setup-environment.outputs.deploy_dir }}" ]

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          registry-url: "https://npm.pkg.github.com"
          # Defaults to the user or organization that owns the workflow file
          scope: "@RaspberryPiFoundation"

      - name: Install code
        run: yarn install --immutable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build WC and HTML renderer bundles
        run: yarn build
        env:
          PUBLIC_URL: ${{ needs.setup-environment.outputs.public_url }}
          ASSETS_URL: ${{ needs.setup-environment.outputs.assets_url }}
          HTML_RENDERER_URL: ${{ needs.setup-environment.outputs.html_renderer_url }}
          REACT_APP_API_ENDPOINT: ${{ inputs.react_app_api_endpoint }}
          REACT_APP_AUTHENTICATION_CLIENT_ID: ${{ inputs.react_app_authentication_client_id }}
          REACT_APP_AUTHENTICATION_URL: ${{ inputs.react_app_authentication_url }}
          REACT_APP_BASE_URL: ${{ needs.setup-environment.outputs.react_app_base_url }}
          REACT_APP_COOKIEBOT_DOMAIN_GROUP_ID: ${{ inputs.react_app_cookiebot_domain_group_id }}
          REACT_APP_GOOGLE_TAG_MANAGER_ID: ${{ inputs.react_app_google_tag_manager_id }}
          REACT_APP_SENTRY_DSN: ${{ inputs.react_app_sentry_dsn }}
          REACT_APP_SENTRY_ENV: ${{ inputs.react_app_sentry_env }}
          REACT_APP_ALLOWED_IFRAME_ORIGINS: ${{ inputs.react_app_allowed_iframe_origins }}
          CSP_API_MULTIPLE_ORIGINS: ${{ inputs.csp_api_multiple_origins }}

      - name: Deploy site to S3 bucket
        if: env.AWS_SECRET_ACCESS_KEY != ''
        run: |
          aws s3 sync ./build/ s3://${{ secrets.AWS_S3_BUCKET }}/${{ needs.setup-environment.outputs.deploy_dir }} --endpoint ${{ secrets.AWS_ENDPOINT }} --progress-frequency 5
          aws s3 sync ./build/chunks/ s3://${{ secrets.AWS_S3_BUCKET }}/chunks/ --endpoint ${{ secrets.AWS_ENDPOINT }} --exclude "*" --include "fetch-worker*" --include "mediapipe/**" --progress-frequency 5
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Update latest version file
        if: env.AWS_SECRET_ACCESS_KEY != '' && github.ref_type == 'tag'
        run: |
          if [ "v$(jq -r .version package.json)" != "${GITHUB_REF_NAME}" ]; then
            echo "v$(jq -r .version package.json) != ${GITHUB_REF_NAME}, skipping latest_version update."
            exit 0
          fi

          # Use no-cache so latest_version is revalidated after tag deploys.
          echo -n "${{ needs.setup-environment.outputs.deploy_dir }}" | aws s3 cp - s3://${{ secrets.AWS_S3_BUCKET }}/latest_version --endpoint ${{ secrets.AWS_ENDPOINT }} --content-type "text/plain" --cache-control "no-cache"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Purge Cloudflare cache
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        run: |
          # Cloudflare expects purge prefixes without the URL scheme.
          # For example, "https://editor-static.raspberrypi.org/releases/v1.2.3"
          # becomes "editor-static.raspberrypi.org/releases/v1.2.3".
          cloudflare_prefix() {
            local url="$1"

            url="${url#https://}"
            url="${url#http://}"
            url="${url%/}"

            printf "%s" "$url"
          }

          # Purge the deployed web component and HTML renderer directories.
          # The trailing slash makes these directory prefixes, so Cloudflare
          # removes cached files under each deployed path.
          purge_prefixes=(
            "$(cloudflare_prefix "$PUBLIC_URL")/"
            "$(cloudflare_prefix "$HTML_RENDERER_URL")/"
          )

          # Tagged releases update /latest_version, which is cached separately
          # from the release directory. Branch deploys do not touch this file.
          if [ "$REF_TYPE" = "tag" ]; then
            purge_prefixes+=("$(cloudflare_prefix "$BASE_URL")/latest_version")
          fi

          # Build the API payload and de-duplicate prefixes. PUBLIC_URL and
          # HTML_RENDERER_URL are often the same, so unique avoids purging the
          # same prefix twice.
          purge_payload="$(
            jq -cn --args '
              $ARGS.positional
              | unique
              | {prefixes: .}
            ' "${purge_prefixes[@]}"
          )"

          echo "Purging Cloudflare cache prefixes:"
          jq -r '.prefixes[] | " - \(.)"' <<<"$purge_payload"

          response="$(
            curl -sS --fail-with-body -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$purge_payload"
          )" || {
            echo "Cloudflare purge request failed:"
            echo "$response"
            exit 1
          }

          jq -e '.success == true' >/dev/null <<<"$response" || {
            echo "Cloudflare purge failed:"
            echo "$response"
            exit 1
          }

          echo "Cloudflare purge succeeded for $PUBLIC_URL"
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PUBLIC_URL: ${{ needs.setup-environment.outputs.public_url }}
          HTML_RENDERER_URL: ${{ needs.setup-environment.outputs.html_renderer_url }}
          BASE_URL: ${{ inputs.base_url }}
          REF_TYPE: ${{ github.ref_type }}
