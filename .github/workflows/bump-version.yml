name: Bump version

on:
  workflow_dispatch:
    inputs:
      level:
        description: Version bump level
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          registry-url: "https://npm.pkg.github.com"
          scope: "@RaspberryPiFoundation"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump_version
        run: |
            yarn version ${{ inputs.level }}
            VERSION=$(node -p 'require("./package.json").version')
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        env:
          VERSION: ${{ steps.bump_version.outputs.version }}
          BRANCH_NAME: actions/bump-version/v${{ steps.bump_version.outputs.version }}
        run: |
          if [ -z "$VERSION" ]; then
            echo "Version output is empty"
            exit 1
          fi

          if git diff --quiet; then
            echo "No changes to commit"
            exit 1
          fi

          git add -A
          git commit -m "Bump version to v$VERSION"
          git push --force origin HEAD:$BRANCH_NAME

      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_BRANCH: main
          HEAD_BRANCH: actions/bump-version/v${{ steps.bump_version.outputs.version }}
          PR_TITLE: Bump version to v${{ steps.bump_version.outputs.version }}
          PR_BODY: |
            Version: v${{ steps.bump_version.outputs.version }}

            Automated version bump generated by this workflow run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh pr create \
            --repo "${{ github.repository }}" \
            --base "$BASE_BRANCH" \
            --head "$HEAD_BRANCH" \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --draft
