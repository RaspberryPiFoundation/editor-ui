# Trigger for learner-experience-integration-tests after staging WC deploy.
#
# Production path: called from ci-cd.yml after deploy-main succeeds.
# Manual test: Actions → "Dispatch learner-experience E2E" → Run workflow
#   (or: gh workflow run dispatch-learner-experience-e2e.yml --ref <branch> -f dry_run=false)
# workflow_dispatch will be removed once the main hook is verified.

name: Dispatch learner-experience E2E

on:
  workflow_call:
    inputs:
      dry_run:
        description: Print payload only; do not POST
        type: boolean
        default: false
      deploy_url:
        description: Staging WC URL included in client_payload
        type: string
        default: https://staging-editor-static.raspberrypi.org/branches/main
      ref:
        description: Git ref reported in client_payload
        type: string
        default: main
      commit_message:
        description: Optional commit message override
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      dry_run:
        description: Print payload only; do not POST
        type: boolean
        default: true
      deploy_url:
        description: Staging WC URL included in client_payload
        type: string
        default: https://staging-editor-static.raspberrypi.org/branches/main
      ref:
        description: Git ref reported in client_payload
        type: string
        default: main
      commit_message:
        description: Optional commit message override (useful for workflow_dispatch)
        type: string
        required: false
        default: ""

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Trigger learner-experience integration tests
        env:
          TOKEN: ${{ secrets.LEARNER_EXPERIENCE_TESTS_DISPATCH_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
          SHA: ${{ github.sha }}
          REF: ${{ inputs.ref }}
          DEPLOY_URL: ${{ inputs.deploy_url }}
          COMMIT_MESSAGE_INPUT: ${{ inputs.commit_message }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -n "${COMMIT_MESSAGE_INPUT}" ]; then
            COMMIT_MESSAGE="${COMMIT_MESSAGE_INPUT}"
          else
            COMMIT_MESSAGE="$(git log -1 --pretty=%B "${SHA}" 2>/dev/null || true)"
          fi

          if [ -z "${COMMIT_MESSAGE}" ]; then
            COMMIT_MESSAGE="workflow_dispatch on ${REF_NAME}"
          fi

          # Truncate for Slack; head -c can cut mid-multibyte char which is fine here.
          COMMIT_MESSAGE="$(printf '%s' "${COMMIT_MESSAGE}" | head -c 80)"

          PAYLOAD="$(
            jq -n \
              --arg repo "editor-ui" \
              --arg sha "${SHA}" \
              --arg ref "${REF}" \
              --arg commit_message "${COMMIT_MESSAGE}" \
              --arg deploy_url "${DEPLOY_URL}" \
              --arg triggered_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg pr "${PR_NUMBER}" \
              '{
                event_type: "learner-experience-test",
                client_payload: (
                  {
                    repo: $repo,
                    sha: $sha,
                    ref: $ref,
                    commit_message: $commit_message,
                    deploy_url: $deploy_url,
                    triggered_at: $triggered_at
                  }
                  + (if $pr == "" then {} else {pr: $pr} end)
                )
              }'
          )"

          {
            echo "### Dispatch payload"
            echo '```json'
            echo "${PAYLOAD}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "Payload:"
          echo "${PAYLOAD}"

          if [ -z "${TOKEN}" ]; then
            echo "LEARNER_EXPERIENCE_TESTS_DISPATCH_TOKEN is not set"
            exit 1
          fi

          if [ "${DRY_RUN}" = "true" ]; then
            echo "dry_run=true — skipping POST"
            exit 0
          fi

          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/RaspberryPiFoundation/learner-experience-integration-tests/dispatches \
            -d "${PAYLOAD}"

          echo "repository_dispatch accepted (204)"
