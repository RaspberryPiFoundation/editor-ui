x-app: &x-app
  build:
    context: .
  environment:
    NPM_AUTH_TOKEN: ${NPM_AUTH_TOKEN}
  volumes:
    - .:/app
    - node_modules:/app/node_modules
    - /var/run/docker.sock:/var/run/docker.sock
  stdin_open: true
services:
  app:
    <<: *x-app
    command: sh -c "yarn install && yarn start"
    ports:
      - "3011:3011"
  scratch-frame:
    <<: *x-app
    command: sh -c "yarn install && yarn workspace @raspberrypifoundation/scratch-frame dev --host 0.0.0.0"
    ports:
      - "3014:3014"
volumes:
  node_modules: null
